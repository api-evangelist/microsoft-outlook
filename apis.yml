    description: >-
      API for managing Focused Inbox overrides and message classification, allowing
      applications to control how incoming messages are categorized between Focused
      and Other tabs.
    image: https://docs.microsoft.com/en-us/graph/images/microsoft-graph.png
    humanURL: 
      https://learn.microsoft.com/en-us/graph/api/resources/manage-focused-inbox?view=graph-rest-1.0
