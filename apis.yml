        url: https://learn.microsoft.com/en-us/graph/outlook-organize-messages
      - type: Authentication
        url: https://learn.microsoft.com/en-us/graph/auth/
      - type: OpenAPI
        url: 
          https://raw.githubusercontent.com/microsoftgraph/msgraph-metadata/master/openapi/v1.0/openapi.yaml
      - type: SDKs
        url: https://learn.microsoft.com/en-us/graph/sdks/sdks-overview
  - name: Microsoft Graph Categories API
    description: >-
      API for managing Outlook categories, allowing applications to create, read,
      update, and delete categories in a user's master category list for organizing
      messages, events, and contacts.
