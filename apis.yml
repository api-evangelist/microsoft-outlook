  - name: Outlook Add-ins API
    description: >-
      JavaScript API for building Outlook add-ins that extend Outlook functionality
      with custom features, using the Office.js library and the Mailbox requirement
      set.
    image: https://docs.microsoft.com/en-us/graph/images/microsoft-graph.png
    humanURL: https://learn.microsoft.com/en-us/office/dev/add-ins/outlook/
