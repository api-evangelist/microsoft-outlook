  - name: Microsoft Graph Mail Rules API
    description: >-
      API for managing Outlook inbox rules that automatically process incoming messages
      based on conditions, enabling actions like moving messages to folders, assigning
      categories, and forwarding.
    image: https://docs.microsoft.com/en-us/graph/images/microsoft-graph.png
    humanURL: 
      https://learn.microsoft.com/en-us/graph/api/resources/messagerule?view=graph-rest-1.0
    baseURL: https://graph.microsoft.com/v1.0
    tags:
      - Rules
      - Inbox Rules
      - Email Automation
      - Filters
    properties:
